<script>
  // ===== MENU MOBILE (igual ao seu) =====
  const toggle = document.querySelector('.nav-toggle');
  const nav = document.getElementById('nav');

  if (toggle && nav) {
    toggle.addEventListener('click', () => {
      nav.classList.toggle('open');
      toggle.setAttribute('aria-expanded', nav.classList.contains('open'));
    });
  }

  // ===== SCROLL SUAVE NAS ÂNCORAS (igual ao seu, só com proteção extra) =====
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', e => {
      const id = link.getAttribute('href');
      if (id && id.length > 1) {
        const el = document.querySelector(id);
        if (el) {
          e.preventDefault();
          el.scrollIntoView({ behavior: "smooth" });
        }
      }
    });
  });

  // ===== GA4: FUNÇÃO SEGURA (não quebra o site se GA falhar) =====
  function safeGtagEvent(eventName, params) {
    try {
      if (typeof gtag === "function") gtag('event', eventName, params || {});
    } catch (e) {}
  }

  function getLinkText(a) {
    const txt = (a.innerText || a.textContent || "").trim();
    if (txt) return txt.slice(0, 80);
    const img = a.querySelector('img');
    if (img && img.alt) return img.alt.slice(0, 80);
    return "(sem texto)";
  }

  function absUrl(url) {
    try { return new URL(url, window.location.href).href; }
    catch { return url; }
  }

  function isSameDomain(url) {
    try {
      const u = new URL(url, window.location.href);
      return u.hostname === window.location.hostname;
    } catch (e) {
      return false;
    }
  }

  // ===== REGRAS DE CATEGORIZAÇÃO =====
  function isWhatsApp(url) {
    return /wa\.me|api\.whatsapp\.com|web\.whatsapp\.com/i.test(url);
  }
  function isYouTube(url) {
    return /youtube\.com|youtu\.be/i.test(url);
  }
  function isInstagram(url) {
    return /instagram\.com/i.test(url);
  }
  function isLinkedIn(url) {
    return /linkedin\.com/i.test(url);
  }
  function isGitHub(url) {
    return /github\.com/i.test(url);
  }
  function isDemo(url) {
    return /nr01teste\.netlify\.app/i.test(url);
  }

  // ===== CAPTURA DE TODOS OS CLIQUES EM LINKS =====
  document.addEventListener('click', function (e) {
    const a = e.target.closest('a');
    if (!a) return;

    const href = a.getAttribute('href');
    if (!href || href.trim() === '' || href.trim() === '#') return;

    const url = href.trim();
    const text = getLinkText(a);

    // Âncora interna (#sobre etc.) -> navegação
    if (url.startsWith('#')) {
      safeGtagEvent('anchor_click', {
        event_category: 'Navegacao',
        event_label: url,
        link_text: text
      });
      return;
    }

    // e-mail
    if (url.startsWith('mailto:')) {
      safeGtagEvent('email_click', {
        event_category: 'Contato',
        event_label: url.replace('mailto:', ''),
        link_text: text
      });
      return;
    }

    // telefone (se um dia você usar tel:)
    if (url.startsWith('tel:')) {
      safeGtagEvent('phone_click', {
        event_category: 'Contato',
        event_label: url.replace('tel:', ''),
        link_text: text
      });
      return;
    }

    const absolute = absUrl(url);

    // WhatsApp (evento separado)
    if (isWhatsApp(absolute)) {
      safeGtagEvent('whatsapp_click', {
        event_category: 'Contato',
        event_label: 'WhatsApp',
        link_url: absolute,
        link_text: text
      });
      return;
    }

    // Demo (evento separado)
    if (isDemo(absolute)) {
      safeGtagEvent('demo_click', {
        event_category: 'Produto',
        event_label: 'Demo PsyPro / NR-01',
        link_url: absolute,
        link_text: text
      });
      return;
    }

    // Links externos: Instagram/LinkedIn/YouTube/GitHub e outros
    if (!isSameDomain(absolute)) {
      let label = 'Externo';
      if (isYouTube(absolute)) label = 'YouTube';
      else if (isInstagram(absolute)) label = 'Instagram';
      else if (isLinkedIn(absolute)) label = 'LinkedIn';
      else if (isGitHub(absolute)) label = 'GitHub';

      safeGtagEvent('outbound_click', {
        event_category: 'Links Externos',
        event_label: label,
        link_url: absolute,
        link_text: text
      });
      return;
    }

    // Link interno (outra página do seu site)
    safeGtagEvent('internal_click', {
      event_category: 'Navegacao',
      event_label: absolute,
      link_text: text
    });
  });

  // ===== FORM: rastrear submit do Formspree (sem mexer no HTML do form) =====
  document.querySelectorAll('form').forEach((form) => {
    form.addEventListener('submit', () => {
      safeGtagEvent('form_submit', {
        event_category: 'Contato',
        event_label: form.getAttribute('action') || '(sem action)'
      });
    });
  });
</script>
